<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Remote Trigger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        button { background: #3f51b5; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 10px; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #333; background: #2b2b2b; color: white; width: 80%; margin-bottom: 10px; }
        #lock-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; color: #ff1744; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="card">
        <h1>Device Setup</h1>
        <button onclick="window.initMode('laptop')">Laptop Mode</button>
        <button onclick="window.initMode('phone')">Phone Mode</button>
    </div>

    <!-- PAIRING SCREEN -->
    <div id="pairing-view" class="card hidden">
        <h2 id="pairing-title">Pairing</h2>
        <input type="text" id="input-session" placeholder="Session ID (e.g. laptop_1)">
        <input type="text" id="input-code" placeholder="Pairing Code (e.g. 1234)">
        <button onclick="window.validatePairing()">Connect</button>
    </div>

    <!-- LAPTOP ACTIVE VIEW -->
    <div id="laptop-view" class="card hidden">
        <h2>Laptop Mode Active</h2>
        <p>Linked Session: <strong id="lp-session-display"></strong></p>
        <p>Status: <span style="color: #4caf50;">Monitoring...</span></p>
    </div>

    <!-- LOCK OVERLAY -->
    <div id="lock-overlay" class="hidden">
        <h1 style="font-size: 5rem;">LOCKED</h1>
        <p>UNAUTHORIZED USAGE DETECTED</p>
    </div>

    <!-- PHONE CONTROL VIEW -->
    <div id="phone-view" class="card hidden">
        <h2>Remote Control</h2>
        <p>Target: <strong id="phone-session-display"></strong></p>
        <button id="toggle-lock-btn" onclick="window.toggleRemoteLock()" style="width: 100%; height: 80px; font-weight: bold;">TOGGLE LOCK</button>
    </div>

    <script>
        const SB_URL = 'https://ccajarjvtqtqxvshzysz.supabase.co';
        const SB_KEY = 'sb_publishable_8Ltq_w1gabVJCAAlfo-skQ_LLA3Ciju';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let activeSession = "";
        let mode = ""; 
        let lockInterval = null;

        window.initMode = function(m) {
            mode = m;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('pairing-view').classList.remove('hidden');
            document.getElementById('pairing-title').innerText = (m === 'laptop') ? "Setup Laptop" : "Pair to Laptop";
        };

        window.validatePairing = async function() {
            const sid = document.getElementById('input-session').value;
            const code = document.getElementById('input-code').value;

            const { data, error } = await supabaseClient.from('status').select('*').eq('device_name', sid).eq('pairing_code', code).single();

            if (data) {
                activeSession = sid;
                document.getElementById('pairing-view').classList.add('hidden');
                if (mode === 'laptop') {
                    document.getElementById('laptop-view').classList.remove('hidden');
                    document.getElementById('lp-session-display').innerText = sid;
                    startLaptopLogic();
                } else {
                    document.getElementById('phone-view').classList.remove('hidden');
                    document.getElementById('phone-session-display').innerText = sid;
                    updatePhoneUI(data.is_locked);
                }
            } else {
                alert("Invalid Session ID or Pairing Code.");
            }
        };

        // --- LAPTOP SIDE ---
        function startLaptopLogic() {
            supabaseClient.channel('realtime_status')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'status' }, payload => {
                    if (payload.new.device_name === activeSession) {
                        applyLock(payload.new.is_locked);
                    }
                }).subscribe();
        }

        function applyLock(isLocked) {
            const overlay = document.getElementById('lock-overlay');
            if (isLocked) {
                overlay.classList.remove('hidden');
                document.documentElement.requestFullscreen().catch(() => {});
                
                // Start Harassment Loop (every 1 second)
                if (!lockInterval) {
                    lockInterval = setInterval(() => {
                        console.warn("LOCK ACTIVE");
                        window.open('https://www.google.com', '_blank');
                        alert("UNAUTHORIZED USAGE - DEVICE LOCKED");
                    }, 1000);
                }
            } else {
                overlay.classList.add('hidden');
                clearInterval(lockInterval);
                lockInterval = null;
                if (document.fullscreenElement) document.exitFullscreen();
            }
        }

        // --- PHONE SIDE ---
        function updatePhoneUI(isLocked) {
            const btn = document.getElementById('toggle-lock-btn');
            btn.innerText = isLocked ? "UNLOCK NOW" : "ACTIVATE LOCK";
            btn.style.background = isLocked ? "#4caf50" : "#f44336";
            btn.dataset.state = isLocked;
        }

        window.toggleRemoteLock = async function() {
            const btn = document.getElementById('toggle-lock-btn');
            const currentState = btn.dataset.state === "true";
            const newState = !currentState;

            const { data } = await supabaseClient.from('status')
                .update({ is_locked: newState })
                .eq('device_name', activeSession)
                .select().single();
            
            if (data) updatePhoneUI(data.is_locked);
        };

        // Re-fullscreen if they escape
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && lockInterval) {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
